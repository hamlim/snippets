<html>
  <body>
    <style>
      script {
        display: block;
        white-space: pre;
        font-family: monospace;
      }
    </style>
    <script type="module" contenteditable="true">
      let TYPES = {
        string: 'string',
        number: 'number',
        boolean: 'boolean',
        shape: 'shape',
        range: 'range',
        options: 'options',
      }

      function evaluateTypes(types, nestedName = undefined) {
        return Object.entries(types).reduce(
          (acc, curr) => ({
            ...acc,
            [curr[0]]: { ...curr[1](curr[0]), nestedName },
          }),
          {},
        )
      }

      let stringType = ({ label }) => name => ({
        propName: name,
        label,
        $type: TYPES.string,
      })

      let numberType = ({ label }) => name => ({
        propName: name,
        label,
        $type: TYPES.number,
      })

      let booleanType = ({ label, defaultValue }) => name => ({
        propName: name,
        label,
        defaultValue,
        $type: TYPES.boolean,
      })

      let shapeType = ({ label, types }) => name => ({
        propName: name,
        label,
        types: evaluateTypes(types, name),
        $type: TYPES.shape,
      })

      let rangeType = ({ label, min, max, step }) => name => ({
        propName: name,
        label,
        step,
        min,
        max,
        $type: TYPES.range,
      })

      let optionsType = ({ label, options }) => name => ({
        propName: name,
        label,
        options,
        $type: TYPES.options,
      })

      const controls = {
        foo: stringType({ label: 'Foo' }),
        bar: numberType({ label: 'Bar' }),
        another: optionsType({
          label: 'Some Options',
          options: ['a', 'b', 'c'],
        }),
        baz: shapeType({
          label: 'Baz',
          types: {
            qux: booleanType({ label: 'Qux' }),
            blah: rangeType({ label: 'Blah', min: 0, max: 10, step: 1 }),
            nested: shapeType({
              label: 'Nested',
              types: { foo: stringType({ label: 'Nested Foo' }) },
            }),
          },
        }),
      }

      const types = evaluateTypes(controls)

      console.log(types)

      function processor(types, render) {
        return Object.entries(types).map(([name, attrs]) => {
          if (attrs.$type === TYPES.shape) {
            return processor(attrs.types, render)
          }
          return render({
            name,
            ...attrs,
          })
        })
      }

      const els = []

      const render = ({ propName, nestedName }) => {
        const el = document.createElement('p')
        el.textContent = nestedName ? `${nestedName} - ${propName}` : propName
        els.push(el)
      }

      processor(types, render)

      els.forEach(el => {
        document.body.appendChild(el)
      })
    </script>
  </body>
</html>
