<html>
  <script type="module">
    let TYPES = {
      string: 'string',
      number: 'number',
      boolean: 'boolean',
      shape: 'shape',
      range: 'range',
    }

    function evaluateTypes(types) {
      return Object.entries(types).reduce(
        (acc, curr) => ({ ...acc, [curr[0]]: curr[1](curr[0]) }),
        {},
      )
    }

    let stringType = ({ label }) => name => ({
      propName: name,
      label,
      $type: TYPES.string,
    })

    let numberType = ({ label }) => name => ({
      propName: name,
      label,
      $type: TYPES.number,
    })

    let booleanType = ({ label, defaultValue }) => name => ({
      propName: name,
      label,
      defaultValue,
      $type: TYPES.boolean,
    })

    let shapeType = ({ label, types }) => name => ({
      propName: name,
      label,
      types: evaluateTypes(types),
      $type: TYPES.shape,
    })

    let rangeType = ({ label, min, max, step }) => name => ({
      propName: name,
      label,
      step,
      min,
      max,
      $type: TYPES.range,
    })

    const controls = {
      foo: stringType({ label: 'Foo' }),
      bar: numberType({ label: 'Bar' }),
      baz: shapeType({
        label: 'Baz',
        types: {
          qux: booleanType({ label: 'Qux' }),
          blah: rangeType({ label: 'Blah', min: 0, max: 10, step: 1 }),
          nested: shapeType({
            label: 'Nested',
            types: { foo: stringType({ label: 'Nested Foo' }) },
          }),
        },
      }),
    }

    console.log(evaluateTypes(controls))
  </script>
</html>
